{% extends 'base.html' %}
{% block content %}
<h5>🔼 Roll Up — Tồn kho theo Địa điểm (Năm {{ nam }})</h5>

<form method="get" class="row g-2 mb-3">
  <div class="col-auto">
    <select name="muc" class="form-select form-select-sm">
      <option value="cuahang"  {{ 'selected' if muc=='cuahang'  }}>Cửa hàng (chi tiết)</option>
      <option value="thanhpho" {{ 'selected' if muc=='thanhpho' }}>Thành phố (roll up)</option>
      <option value="bang"     {{ 'selected' if muc=='bang'     }}>Bang (cao nhất)</option>
    </select>
  </div>
  <div class="col-auto">
    <input type="number" name="nam" value="{{ nam }}" class="form-control form-control-sm" style="width:90px" placeholder="Năm">
  </div>
  <div class="col-auto">
    <button type="submit" class="btn btn-sm btn-primary">Xem</button>
  </div>
</form>

<div class="card">
  <div class="card-body">
    <table class="table table-bordered table-hover table-sm">
      <thead class="table-dark">
        <tr>{% for c in cols %}<th>{{ c }}</th>{% endfor %}</tr>
      </thead>
      <tbody>
        {% for r in rows %}
        <tr>
          {% for c in cols %}
          <td>{{ "{:,}".format(r[c]) if c == 'TonKho' else r[c] }}</td>
          {% endfor %}
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
