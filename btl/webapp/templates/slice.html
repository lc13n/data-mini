{% extends 'base.html' %}
{% block content %}
<h5>✂ Slice — Cắt 1 chiều cố định</h5>

<form method="get" class="row g-2 mb-3">
  <div class="col-auto">
    <label class="form-label mb-0 small">Loại KH</label>
    <select name="loai" class="form-select form-select-sm">
      <option value="">-- Tất cả --</option>
      {% for r in loai_list %}
      <option value="{{ r['LoaiKhachHang'] }}" {{ 'selected' if sel_loai==r['LoaiKhachHang'] }}>
        {{ r['LoaiKhachHang'] }}
      </option>
      {% endfor %}
    </select>
  </div>
  <div class="col-auto">
    <label class="form-label mb-0 small">Năm</label>
    <select name="nam" class="form-select form-select-sm">
      <option value="">-- Tất cả --</option>
      {% for r in nam_list %}
      <option value="{{ r['Nam'] }}" {{ 'selected' if sel_nam==r['Nam'] }}>{{ r['Nam'] }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-auto">
    <label class="form-label mb-0 small">Kích cỡ</label>
    <select name="kichco" class="form-select form-select-sm">
      <option value="">-- Tất cả --</option>
      {% for r in kichco_list %}
      <option value="{{ r['KichCo'] }}" {{ 'selected' if sel_kichco==r['KichCo'] }}>{{ r['KichCo'] }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-auto align-self-end">
    <button type="submit" class="btn btn-sm btn-primary">Lọc</button>
  </div>
</form>

<div class="card">
  <div class="card-body">
    <p class="text-muted small">Kết quả: {{ rows|length }} dòng</p>
    <table class="table table-bordered table-hover table-sm">
      <thead class="table-dark">
        <tr>{% for c in cols %}<th>{{ c }}</th>{% endfor %}</tr>
      </thead>
      <tbody>
        {% for r in rows %}
        <tr>
          {% for c in cols %}
          <td>{{ "{:,.0f}".format(r[c]) if c=='DoanhThu' else r[c] }}</td>
          {% endfor %}
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
